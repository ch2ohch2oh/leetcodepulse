<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two Sum Pulse</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
        :root {
            --bg-color: #f8faf9;
            --text-color: #28312f;
            --secondary-text: #687471;
            --accent-color: #28766e;
            --border-color: #e2eae7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            padding: 4rem 2rem;
            max-width: 900px;
            margin: 0 auto;
            line-height: 1.5;
        }

        header {
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 500;
            letter-spacing: -0.03em;
            margin-bottom: 1.5rem;
            color: var(--accent-color);
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.25rem;
        }

        label {
            font-size: 0.9rem;
            color: var(--secondary-text);
        }

        select {
            min-height: 36px;
            padding: 0.35rem 0.6rem;
            font-size: inherit;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            color: var(--text-color);
            font-family: inherit;
        }

        select:focus-visible {
            outline: 2px solid var(--accent-color);
            outline-offset: 2px;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .chart-current {
            max-width: 620px;
            color: var(--text-color);
        }

        .current-number {
            color: var(--accent-color);
        }

        .header-description {
            font-size: 0.95rem;
            color: var(--secondary-text);
            margin-top: -1rem;
            margin-bottom: 2rem;
        }

        .header-description a {
            color: inherit;
            text-decoration-color: var(--accent-color);
            text-underline-offset: 0.18em;
        }

        .header-description a:hover {
            color: var(--text-color);
        }

        .chart-wrapper {
            position: relative;
            height: 550px;
            width: 100%;
        }

        footer {
            margin-top: 6rem;
            padding: 2rem 0;
            border-top: 1px solid var(--border-color);
            font-size: 0.8rem;
            color: var(--secondary-text);
            text-align: center;
        }

        footer p {
            margin: 0.25rem 0;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
        }

        @media (max-width: 768px) {
            body {
                padding: 2.5rem 1rem;
            }

            h1 {
                font-size: 1.75rem;
            }

            header {
                text-align: center;
                margin-bottom: 2.5rem;
            }

            .header-description {
                font-size: 0.85rem;
                margin-top: -0.5rem;
                margin-bottom: 1.5rem;
            }

            .chart-header {
                align-items: center;
                text-align: left;
            }

            .chart-wrapper {
                height: 300px;
            }

            footer {
                margin-top: 4rem;
            }
        }
    </style>
</head>

<body>
    <header>
        <h1>Two Sum Pulse</h1>
        <p class="header-description"><a href="https://leetcode.com/problems/two-sum/" target="_blank" rel="noopener noreferrer">Two Sum</a> is a popular coding-interview puzzle. We use how often people practice it as a rough pulse of the tech job market.</p>

    </header>

    <div class="chart-header">
        <div class="chart-current" id="chartSummary" aria-live="polite">
            <span class="current-number" id="currentValue">-</span> attempts were submitted <span id="currentBucket">-</span>.
        </div>
        <select id="intervalSelect" aria-label="Aggregation granularity">
            <option value="hour" selected>Hourly</option>
            <option value="day">Daily</option>
            <option value="week">Weekly</option>
            <option value="month">Monthly</option>
        </select>
    </div>

    <div class="chart-wrapper">
        <canvas id="chart"></canvas>
    </div>

    <footer>
        <p>© 2026 Two Sum Pulse • Data through <span id="lastUpdate">-</span></p>
    </footer>

    <script>
        // Data injected by the generator
        const DATA = {{ DATA_JSON | safe }};
        let chart = null;

        const intervalSelect = document.getElementById('intervalSelect');

        intervalSelect.addEventListener('change', () => {
            updateView();
        });

        function updateView() {
            loadData(intervalSelect.value);
        }

        function aggregateData(rawData, interval) {
            const estimatedGapMs = 90 * 60 * 1000;
            // 1. Calculate diffs with duration
            const diffs = [];
            let recoveryFloor = null;
            for (let i = 1; i < rawData.length; i++) {
                const current = rawData[i];
                const prev = rawData[i - 1];
                
                const curTime = new Date(current.timestamp).getTime();
                const prevTime = new Date(prev.timestamp).getTime();
                const duration = curTime - prevTime; // Duration in ms

                const curVal = current.total_submissions || 0;
                const prevVal = prev.total_submissions || 0;

                if (curVal <= 0 || prevVal <= 0) continue;
                if (recoveryFloor !== null) {
                    if (curVal >= recoveryFloor) recoveryFloor = null;
                    continue;
                }
                if (curVal < prevVal) {
                    recoveryFloor = prevVal;
                    continue;
                }

                diffs.push({
                    startTime: prevTime,
                    endTime: curTime,
                    value: curVal - prevVal,
                    duration: duration,
                    estimated: duration > estimatedGapMs
                });
            }

            if (interval === 'raw') {
                return diffs.map(d => ({
                    timestamp: new Date(d.endTime),
                    value: d.value
                }));
            }

            // 2. Aggregate diffs into buckets
            // We'll distribute the value proportionally to buckets.
            const buckets = new Map();

            // Helper to get bucket start time
            function getBucketStart(ms, interval) {
                const time = new Date(ms);
                if (interval === 'hour') {
                    time.setMinutes(0, 0, 0);
                    return time.getTime();
                } else if (interval === 'day') {
                    time.setHours(0, 0, 0, 0);
                    return time.getTime();
                } else if (interval === 'week') {
                    const day = time.getDay();
                    const diff = time.getDate() - day;
                    time.setDate(diff); // Set to Sunday
                    time.setHours(0, 0, 0, 0);
                    return time.getTime();
                } else if (interval === 'month') {
                    time.setDate(1);
                    time.setHours(0, 0, 0, 0);
                    return time.getTime();
                }
                return ms;
            }

            // Helper to get next bucket start
            function getNextBucketStart(bucketStart, interval) {
                const time = new Date(bucketStart);
                if (interval === 'hour') time.setHours(time.getHours() + 1);
                else if (interval === 'day') time.setDate(time.getDate() + 1);
                else if (interval === 'week') time.setDate(time.getDate() + 7);
                else if (interval === 'month') time.setMonth(time.getMonth() + 1);
                return time.getTime();
            }

            diffs.forEach(d => {
                if (d.value === 0 || d.duration <= 0) return;

                let currentBucketStart = getBucketStart(d.startTime, interval);
                const lastBucketStart = getBucketStart(d.endTime - 1, interval);
                const estimatedContribution = d.estimated && currentBucketStart !== lastBucketStart;
                let remainingDuration = d.duration;
                let currentValue = d.value;
                
                // We assume uniform distribution of 'value' over 'duration' (rate = value/duration)
                const rate = currentValue / remainingDuration;

                // Iterate through buckets covered by this duration
                // Start from the bucket covering startTime
                let t = d.startTime;
                
                while (t < d.endTime) {
                    const bucketEnd = getNextBucketStart(currentBucketStart, interval);
                    
                    // The overlap of this segment with the current bucket
                    // Segment is [t, d.endTime]
                    // Bucket is [currentBucketStart, bucketEnd]
                    // But since we increment t, we just care about min(d.endTime, bucketEnd) - t
                    
                    const segmentEnd = Math.min(d.endTime, bucketEnd);
                    const overlap = segmentEnd - t;
                    
                    if (overlap > 0) {
                        const contribution = overlap * rate;
                        const bucket = buckets.get(currentBucketStart) || { value: 0, estimated: false };
                        bucket.value += contribution;
                        bucket.estimated = bucket.estimated || estimatedContribution;
                        buckets.set(currentBucketStart, bucket);
                    }

                    t = segmentEnd;
                    if (t < d.endTime) {
                         currentBucketStart = bucketEnd;
                    }
                }
            });

            // 3. Format result
            const sortedKeys = Array.from(buckets.keys()).sort();
            return sortedKeys.map(key => ({
                timestamp: new Date(key),
                value: Math.round(buckets.get(key).value),
                estimated: buckets.get(key).estimated
            }));
        }

        function chartWindow(data, interval) {
            if (data.length === 0) return data;

            const latestSampleTime = new Date(DATA[DATA.length - 1].timestamp).getTime();
            const completeData = data.filter(point => {
                const bucketEnd = new Date(point.timestamp);
                if (interval === 'hour') bucketEnd.setHours(bucketEnd.getHours() + 1);
                else if (interval === 'day') bucketEnd.setDate(bucketEnd.getDate() + 1);
                else if (interval === 'week') bucketEnd.setDate(bucketEnd.getDate() + 7);
                else if (interval === 'month') bucketEnd.setMonth(bucketEnd.getMonth() + 1);
                return bucketEnd.getTime() <= latestSampleTime;
            });
            if (completeData.length === 0) return completeData;
            if (interval === 'month') return completeData;

            const latestTime = completeData[completeData.length - 1].timestamp.getTime();
            const windowDays = interval === 'hour' ? 7 : interval === 'day' ? 90 : 365;
            const cutoff = latestTime - windowDays * 24 * 60 * 60 * 1000;
            return completeData.filter(point => point.timestamp.getTime() >= cutoff);
        }

        function loadData(interval) {
            if (!DATA || DATA.length === 0) {
                if (chart) chart.destroy();
                document.getElementById('currentValue').textContent = '-';
                document.getElementById('currentBucket').textContent = '-';
                document.getElementById('lastUpdate').textContent = '-';
                return;
            }

            const processedData = chartWindow(aggregateData(DATA, interval), interval);

            updateChart(processedData, interval);
            updateSummary(processedData, interval);
        }

        function formatBucket(timestamp, interval) {
            const start = new Date(timestamp);
            if (interval === 'hour') {
                const end = new Date(start);
                end.setHours(end.getHours() + 1);
                const day = start.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                const startTime = start.toLocaleTimeString('en-US', { hour: 'numeric' });
                const endTime = end.toLocaleTimeString('en-US', { hour: 'numeric' });
                return `between ${startTime} and ${endTime} on ${day}`;
            }
            if (interval === 'day') {
                const day = start.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                return `on ${day}`;
            }
            if (interval === 'week') {
                const end = new Date(start);
                end.setDate(end.getDate() + 6);
                const from = start.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                const to = end.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                return `from ${from} to ${to}`;
            }
            const month = start.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            return `in ${month}`;
        }

        function updateSummary(data, interval) {
            if (!data || data.length === 0) return;
            const latestBucket = data[data.length - 1];
            const latestSample = DATA[DATA.length - 1];
            document.getElementById('currentValue').textContent = latestBucket.value.toLocaleString();
            const estimateLabel = latestBucket.estimated ? ' (estimated)' : '';
            document.getElementById('currentBucket').textContent = `${formatBucket(latestBucket.timestamp, interval)}${estimateLabel}`;
            document.getElementById('lastUpdate').textContent = new Date(latestSample.timestamp).toLocaleString('en-US', {
                    month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit',
                    timeZoneName: 'short'
            });
        }

        function updateChart(data, interval) {
            const ctx = document.getElementById('chart').getContext('2d');
            const labelText = "Attempts submitted";

            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [{
                        label: labelText,
                        data: data.map(d => ({ x: d.timestamp, y: d.value, estimated: d.estimated })),
                        borderColor: '#28766e',
                        borderWidth: 1.5,
                        backgroundColor: 'rgba(0,0,0,0)',
                        pointRadius: 0,
                        pointHoverRadius: 4,
                        pointHoverBackgroundColor: '#28766e',
                        tension: 0,
                        segment: {
                            borderDash: ctx => {
                                if (ctx.p0.skip || ctx.p1.skip) return undefined;
                                if (ctx.p0.raw.estimated || ctx.p1.raw.estimated) return [6, 6];
                                return undefined;
                            }
                        }
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        intersect: false,
                        mode: 'index'
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#fff',
                            titleColor: '#666',
                            bodyColor: '#000',
                            borderColor: '#e2eae7',
                            borderWidth: 1,
                            padding: 10,
                            displayColors: false,
                            callbacks: {
                                title: (items) => {
                                    const d = new Date(items[0].label);
                                    let fmt = { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
                                    if (interval === 'day' || interval === 'week') {
                                        fmt = { month: 'short', day: 'numeric', year: 'numeric' };
                                    } else if (interval === 'month') {
                                        fmt = { month: 'long', year: 'numeric' };
                                    }
                                    return d.toLocaleString('en-US', fmt);
                                },
                                label: (context) => {
                                    const suffix = context.raw.estimated ? ' (estimated)' : '';
                                    return `${context.parsed.y.toLocaleString()} attempts submitted${suffix}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: {
                                unit: interval,
                                tooltipFormat: 'PP pp',
                                displayFormats: {
                                    hour: 'MMM d, h:mm a',
                                    day: 'MMM d',
                                    week: 'MMM d',
                                    month: 'MMM yyyy'
                                }
                            },
                            grid: { display: false },
                            ticks: {
                                maxTicksLimit: 8,
                                color: '#788582',
                                font: { size: 11 }
                            },
                            border: { display: false }
                        },
                        y: {
                            grid: {
                                color: '#e7eeec',
                                drawBorder: false,
                            },
                            ticks: {
                                color: '#788582',
                                font: { size: 11 }
                            },
                            border: { display: false } // Remove Y axis line
                        }
                    }
                }
            });
        }

        updateView();
    </script>
</body>

</html>
